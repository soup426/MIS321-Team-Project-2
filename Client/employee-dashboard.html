<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mulholland RE — Employee dashboard</title>
  <link href="vendor/bootstrap/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="vendor/gridstack/gridstack.min.css" />
  <link rel="stylesheet" href="vendor/gridstack/gridstack-extra.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .grid-stack {
      min-height: calc(100vh - 160px);
    }
    .widget-body {
      overflow: auto;
      flex: 1;
    }
    .ticket-line {
      display: flex;
      gap: .5rem;
      align-items: baseline;
      padding: .35rem .25rem;
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .ticket-line:last-child { border-bottom: 0; }
    .ticket-title { flex: 1; min-width: 0; }
    .ticket-title .text-truncate { max-width: 100%; }
  </style>
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Mulholland Real Estate</a>
      <span class="navbar-text text-secondary small">Employee dashboard</span>
      <div class="ms-auto d-flex gap-2 align-items-center">
        <span class="text-secondary small d-none d-md-inline" id="whoami"></span>
        <span class="text-secondary small d-none d-md-inline" id="saveHint">Auto-saved</span>
        <button class="btn btn-outline-secondary btn-sm" type="button" id="btnReset">Reset layout</button>
        <a class="btn btn-outline-light btn-sm" href="/maintenance.html">Full dashboard</a>
        <button class="btn btn-outline-warning btn-sm" type="button" id="btnLogout">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <div id="alert" class="alert d-none" role="alert"></div>
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1080">
      <div id="toastHost" class="toast-container"></div>
    </div>

    <div class="grid-stack" id="grid"></div>
  </main>

  <template id="widgetTpl">
    <div class="card h-100 border-0">
      <div class="card-header bg-body border-0 pb-0">
        <div class="d-flex align-items-center">
          <div class="fw-semibold" data-title></div>
          <button class="btn btn-sm btn-outline-secondary ms-auto" type="button" data-refresh>Refresh</button>
        </div>
        <div class="text-muted small" data-subtitle></div>
      </div>
      <div class="card-body pt-2 widget-body" data-body></div>
    </div>
  </template>

  <div class="modal fade" id="ticketModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title">Ticket <span id="mReqNum"></span></h5>
            <div class="small text-muted">
              <span id="mWhen"></span> · <strong id="mProp"></strong>
            </div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-8">
              <div class="small text-muted mb-1">Request</div>
              <div class="border rounded p-2 bg-body" id="mText"></div>
              <div class="mt-3 d-none" id="mRiskWrap">
                <div class="small text-muted mb-1">Risk notes</div>
                <div class="border rounded p-2 bg-body" id="mRisk"></div>
              </div>

              <div class="mt-3" id="mImagesWrap">
                <div class="d-flex align-items-center">
                  <div class="small text-muted">Photos</div>
                </div>
                <div class="d-flex flex-wrap gap-2 mt-2" id="mImages"></div>
                <div class="input-group input-group-sm mt-2">
                  <input class="form-control" type="file" id="mImageFile" accept="image/png,image/jpeg,image/webp" />
                  <button class="btn btn-outline-primary" type="button" id="mUploadImageBtn">Upload</button>
                </div>
                <div class="form-text">JPEG/PNG/WebP up to ~10MB.</div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="mb-2">
                <div class="small text-muted">Status</div>
                <div id="mStatus"></div>
              </div>
              <div class="mb-2">
                <div class="small text-muted">AI triage</div>
                <div id="mPred"></div>
                <div class="small text-muted mt-1">Confidence: <strong id="mConf"></strong></div>
              </div>
              <div class="mb-2">
                <label class="form-label small text-muted">Assign to</label>
                <div class="input-group input-group-sm">
                  <select class="form-select" id="mAssignee"></select>
                  <button class="btn btn-outline-primary" type="button" id="mAssignBtn">Assign</button>
                </div>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-success" type="button" id="mCloseBtn">Close</button>
                <button class="btn btn-sm btn-outline-secondary" type="button" id="mReopenBtn">Reopen</button>
                <button class="btn btn-sm btn-outline-secondary ms-auto" type="button" id="mTriageBtn">Triage</button>
              </div>
            </div>
            <div class="col-12">
              <div class="d-flex align-items-center mb-2">
                <div class="small text-muted">Notes & events</div>
              </div>
              <div id="mEvents" class="vstack gap-2"></div>
              <hr class="my-3" />
              <form id="mNoteForm" class="row g-2">
                <div class="col-md-3">
                  <input class="form-control form-control-sm" id="mNoteAuthor" placeholder="Your name (optional)" />
                </div>
                <div class="col-md-7">
                  <input class="form-control form-control-sm" id="mNoteText" placeholder="Add a note…" required />
                </div>
                <div class="col-md-2 text-end">
                  <button class="btn btn-primary btn-sm" type="submit">Add note</button>
                </div>
              </form>
            </div>
          </div>
        </div>
        <div class="modal-footer small text-muted"></div>
      </div>
    </div>
  </div>

  <script src="vendor/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="vendor/gridstack/gridstack-all.js"></script>
  <script src="employee-dashboard.js?v=6"></script>
</body>
</html>
