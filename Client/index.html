<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mulholland RE — Maintenance triage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
    <div class="container-fluid">
      <span class="navbar-brand">Mulholland Real Estate</span>
      <span class="navbar-text text-secondary small">Maintenance triage dashboard</span>
    </div>
  </nav>

  <main class="container pb-5">
    <div class="row g-3 mb-3 align-items-end">
      <div class="col-md-3">
        <label class="form-label small text-muted">API base</label>
        <input type="text" class="form-control form-control-sm" id="apiBase" value="http://localhost:5278" />
      </div>
      <div class="col-md-2">
        <label class="form-label small text-muted">Filter urgency</label>
        <select class="form-select form-select-sm" id="filterUrgency">
          <option value="">All</option>
          <option value="Emergency">Emergency</option>
          <option value="Urgent">Urgent</option>
          <option value="Routine">Routine</option>
        </select>
      </div>
      <div class="col-md-2 form-check mt-4">
        <input class="form-check-input" type="checkbox" id="filterHuman" />
        <label class="form-check-label small" for="filterHuman">Needs human only</label>
      </div>
      <div class="col-md-5 text-md-end">
        <button type="button" class="btn btn-primary btn-sm" id="btnLoad">Refresh</button>
        <button type="button" class="btn btn-outline-primary btn-sm" id="btnTriageAll">Triage all</button>
      </div>
    </div>

    <div id="alert" class="alert d-none" role="alert"></div>

    <div class="card shadow-sm mb-3">
      <div class="card-body py-2">
        <div class="row text-center small" id="summaryRow">
          <div class="col">Total: <strong id="sumTotal">—</strong></div>
          <div class="col">Triaged: <strong id="sumTriaged">—</strong></div>
          <div class="col">Human review: <strong id="sumHuman">—</strong></div>
          <div class="col">Cat match (vs sample): <strong id="sumCat">—</strong></div>
          <div class="col">Urgency match: <strong id="sumUrg">—</strong></div>
        </div>
      </div>
    </div>

    <div class="table-responsive card shadow-sm">
      <table class="table table-sm table-hover mb-0 align-middle">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>When</th>
            <th>Property / unit</th>
            <th>Request</th>
            <th>Predicted</th>
            <th>Conf.</th>
            <th>Human?</th>
            <th>vs sample</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
