<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mulholland RE — Portal</title>
  <link href="vendor/bootstrap/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
    <div class="container-fluid">
      <span class="navbar-brand">Mulholland Real Estate</span>
      <span class="navbar-text text-secondary small">Maintenance & resident portal</span>
    </div>
  </nav>

  <main class="container pb-5" style="max-width: 1000px;">
    <div class="row g-4">
      <div class="col-md-6">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">Resident</h5>
            <p class="text-muted mb-3">Submit a maintenance request with optional photos. No login.</p>
            <a class="btn btn-primary" href="resident.html">Submit a request</a>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">Maintenance</h5>
            <p class="text-muted mb-3">View and triage tickets, assign staff, and close requests. Login required.</p>
            <a class="btn btn-dark" href="maintenance-login.html" id="btnMaintenance">Open dashboard</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="vendor/bootstrap/bootstrap.bundle.min.js"></script>
  <script>
    // If already logged in, skip login page.
    (function () {
      try {
        const token = localStorage.getItem("maintenanceAccessToken");
        if (token) {
          const btn = document.getElementById("btnMaintenance");
          if (btn) btn.href = "maintenance.html";
        }
      } catch {}
    })();
  </script>
</body>
</html>
